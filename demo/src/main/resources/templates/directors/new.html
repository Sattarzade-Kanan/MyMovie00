<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Director</title>
</head>
<body>
  <h1>New Director</h1>
  <style>
    .errors-message {
        margin-top: 6px;
        padding: 8px 12px;
        background-color: #ffe6e6;
        color: #c62828;
        border: 1px solid #f5c2c2;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 500;
        display: inline-block;
    }

  </style>

      <form th:action="@{/directors}" th:object="${directorForm}" method="post">
        Name:
        <input type="text" th:field="*{name}">
        <div class="errors-message" style="color :red" th:if="${#fields.hasErrors('name')}"
             th:errors="*{name}"></div>
        <br>
        SurName:
        <input type="text" th:field="*{surname}">
        <div class="errors-message" style="color :red" th:if="${#fields.hasErrors('surname')}" th:errors="*{surname}"></div>
        <br>
        Birthday:
        <input type="date" th:field="*{birthday}">
        <div class="errors-message" style="color :red" th:if="${#fields.hasErrors('birthday')}" th:errors="*{birthday}"></div>
        <br>
        Age:
        <input type="number" th:field="*{age}">
        <div class="errors-message" style="color :red" th:if="${#fields.hasErrors('age')}" th:errors="*{age}"></div>
 <button type="submit">Save</button>
        <a href="/directors">Go to Home</a>
      </form>
  <style>
    .custom-select {
width: 100%;
max-width: 300px;
padding: 10px 14px;
font-size: 14px;
border: 1px solid #ccc;
border-radius: 8px;
background-color: #ffffff;
color: #333;
cursor: pointer;
transition: all 0.3s ease;
outline: none;
}

.custom-select:hover {
border-color: #4a90e2;
}

.custom-select:focus {
border-color: #4a90e2;
box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.2);
}

.custom-select option {
padding: 10px;
}
  </style>
  <style> body { font-family: Arial, sans-serif; background-color: #f4f6f8; margin: 0; padding: 20px; } h1 { color: #333; text-align: center; } a { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #007bff; } form { max-width: 400px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); } div { margin-bottom: 15px; } label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; } input[type="text"], input[type="date"], input[type="number"] { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; } button { width: 100%; padding: 10px; background: #007bff; border: none; border-radius: 4px; color: #fff; font-size: 16px; cursor: pointer; } button:hover { background: #0056b3; } </style>
</body>
</html>
